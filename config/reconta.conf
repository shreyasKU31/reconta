# =============================================================================
# reconta.conf — Reconta configuration
#
# This file is sourced as bash. Override any value here, or export the same
# variable in your shell before running reconta (env wins over this file).
# API keys are read from the environment / the tools' own config files
# (e.g. ~/.config/subfinder/provider-config.yaml) — never hard-code secrets.
# =============================================================================

# ---- Performance -----------------------------------------------------------
THREADS=50                 # generic concurrency for httpx/dnsx/nuclei/etc.
RESOLVER_THREADS=200       # dnsx / puredns resolve concurrency
RATE_LIMIT=150             # global req/s ceiling for probing tools
HTTP_TIMEOUT=8             # per-request timeout (seconds)

# ---- Stage toggles (1 = on, 0 = off) ---------------------------------------
ENABLE_PASSIVE_SUBS=1      # subfinder / amass passive / assetfinder / crt.sh
ENABLE_ACTIVE_SUBS=1       # permutations + brute-force resolve (puredns)
ENABLE_PORTS=1             # naabu + nmap on live hosts
ENABLE_URLS=1              # gau / waybackurls / katana + uro filtering
ENABLE_JS=1               # JS discovery + secret scanning
ENABLE_PARAMS=1            # arjun / paramspider
ENABLE_OSINT=1             # asnmap / whois / theHarvester
ENABLE_VULNS=1             # nuclei + subzy takeover
ENABLE_FUZZ=1              # active bug hunting: DAST fuzzing, XSS, redirect, CORS
ENABLE_SCREENSHOTS=0       # gowitness (off by default — slow, heavy)
ENABLE_ANALYZE=1           # score & prioritize collected data → interesting.txt
ENABLE_DIFF=1              # change detection vs previous run → new.txt
ENABLE_JSON=1              # emit machine-readable report.json
ENABLE_WORDLIST=1          # build target-specific wordlists from OSINT data

# ---- Custom wordlists ------------------------------------------------------
CEWL_DEPTH=2               # how deep CeWL spiders the site for vocabulary
CEWL_MIN=4                 # minimum word length CeWL keeps
WORDLIST_MINLEN=3          # minimum length for generated wordlist tokens
WORDLIST_YEARS="2023 2024 2025 2026"   # years appended in password patterns
WORDLIST_FFUF=0            # run ffuf with the custom dir list (auto-on in deep)

# ---- Analysis / monitoring -------------------------------------------------
# Signature knowledge base that drives prioritization (edit to tune weights).
SIGNATURES="${SIGNATURES:-$RECONTA_HOME/config/signatures.txt}"
# Where per-target snapshots for change detection are stored.
STATE_DIR="${STATE_DIR:-$HOME/.config/reconta/state}"
# MONITOR=1 pushes a notification whenever a diff finds NEW assets (needs notify).
MONITOR=0

# ---- Depth / safety knobs --------------------------------------------------
# 'quick'   = passive-only, no brute force, no port scan, fast nuclei
# 'normal'  = passive + light active, top ports, standard nuclei  (default)
# 'deep'    = full brute force, full port scan, crawl + fuzz, all templates
PROFILE=normal

NAABU_TOP_PORTS=100        # naabu --top-ports value in normal profile
NUCLEI_SEVERITY="critical,high,medium,low"   # ignore 'info' noise by default
NUCLEI_RATE=150

# ---- Wordlists / resolvers (edit to match your box) ------------------------
# Sensible defaults for a SecLists install; override if yours live elsewhere.
DNS_WORDLIST="${DNS_WORDLIST:-/usr/share/seclists/Discovery/DNS/subdomains-top1million-20000.txt}"
RESOLVERS="${RESOLVERS:-$HOME/.config/reconta/resolvers.txt}"
PERM_WORDLIST="${PERM_WORDLIST:-/usr/share/seclists/Discovery/DNS/dns-Jhaddix.txt}"

# ---- Notifications (optional) ----------------------------------------------
# When 1 and `notify` is configured (~/.config/notify/provider-config.yaml),
# the final report summary is pushed to Telegram/Discord/Slack.
NOTIFY=0
